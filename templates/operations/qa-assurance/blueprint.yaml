id: qa-assurance
name: QA Assurance Service
display_name: QA Assurance
icon: "🧪"
kind: quality
category: services
outcome: "End-to-end test coverage, structured bug reports, and a concrete fix-and-improvement plan."
description: Template for a QA operation that tests software end to end, classifies and documents every failure, and produces client-ready feedback with actionable remediation plans.
objective: Cover the target software from user-facing flows down to integration boundaries, surface every defect with severity and root cause, and hand off a prioritised fix plan the engineering team can execute immediately.
estimated_setup_minutes: 5

first_tasks:
  - id: test-strategy
    title: "Draft the test strategy"
    prompt: |
      Read the project structure and identify: (1) user-facing flows that must work end to end, (2) integration points most likely to hide failures, (3) edge cases that are commonly skipped. Produce a tiered test strategy — smoke, regression, and exploratory — with a rationale for each tier.
    expected_output: "A tiered test strategy document with scope, risk rationale, and a list of scenarios per tier."
  - id: bug-triage-template
    title: "Set the bug classification schema"
    prompt: |
      Define the severity scale (P0–P3) and the root-cause taxonomy the team will use. Map each severity level to an SLA and an escalation path. Keep it short — one page the whole team can apply consistently without debate.
    expected_output: "A bug classification schema with severity definitions, root-cause taxonomy, and escalation rules."

skills:
  - name: "Test design"
    purpose: "Write test plans, test cases, and acceptance criteria from requirements or live code."
  - name: "Defect analysis"
    purpose: "Reproduce failures, isolate root causes, and classify severity and priority."
  - name: "Fix planning"
    purpose: "Translate bug reports into actionable remediation tasks with effort estimates and risk notes."
  - name: "Client reporting"
    purpose: "Produce structured, evidence-backed quality reports a non-technical stakeholder can act on."

requirements:
  - kind: api-key
    name: "ANTHROPIC_API_KEY or OPENAI_API_KEY"
    required: true
    detail: "Powers the QA agents."
  - kind: runtime
    name: "Claude Code or Codex CLI"
    required: true
    detail: "Runs the agent loops locally."

example_artifacts:
  - kind: document
    title: "Test strategy"
  - kind: report
    title: "Bug report bundle"
  - kind: plan
    title: "Fix and improvement plan"
  - kind: checklist
    title: "Regression checklist"

default_reviewer: ceo
reviewer_paths:
  "team/test-plans/**": test-engineer
  "team/bugs/**": bug-analyst
  "team/fix-plans/**": fix-planner
  "team/reports/**": reporter

employee_blueprints:
  - workflow-automation-builder

starter:
  lead_slug: ceo
  general_channel_description: "Command deck for the {{brand_name}} QA operation."
  kickoff_prompt: |
    Stand up the {{brand_name}} QA operation. The goal is to test the target software end to end, surface every defect with severity and root cause, and hand off a prioritised fix-and-improvement plan the engineering team can execute immediately.

    Start by agreeing on scope with the client: what flows must pass, what is explicitly out of scope, and what the release deadline is. Then assign each specialist their lane. Every test result, bug report, and fix plan goes into the wiki with full evidence — no undocumented findings.

  agents:
    - slug: ceo
      emoji: "🎯"
      name: QA Director
      role: Owns scope, prioritisation, client communication, and final sign-off
      permission_mode: plan
      checked: true
      type: lead
      built_in: true

    - slug: test-engineer
      emoji: "🔬"
      name: Test Engineer
      role: Designs and executes the test suite — smoke, regression, exploratory, and edge-case coverage
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Test strategy and planning
        - End-to-end test execution
        - Regression suites
        - Edge-case identification
        - CI pipeline integration
      personality: |
        Meticulous engineer who writes test plans before touching the keyboard. Treats an untested flow as a liability, not a to-do. Will find the edge case everyone else called "impossible". Documents everything — a test without evidence didn't happen.

    - slug: bug-analyst
      emoji: "🐛"
      name: Bug Analyst
      role: Investigates failures, isolates root causes, and classifies every defect by severity and priority
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Root cause analysis
        - Defect classification (P0–P3)
        - Reproduction steps
        - Log and trace analysis
        - Regression impact assessment
      personality: |
        Methodical analyst who never closes a bug without a reproduction recipe and a root cause. Skeptical of "works on my machine". Annotates every finding with evidence. Classifies severity with precision — a P0 is not a P1 with bad PR skills.

    - slug: fix-planner
      emoji: "🛠️"
      name: Fix Planner
      role: Turns bug reports into actionable remediation tasks with effort estimates, risk notes, and improvement opportunities
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Remediation planning
        - Effort estimation
        - Risk and dependency mapping
        - Technical debt triage
        - Improvement roadmapping
      personality: |
        Pragmatic planner who translates defect lists into sprint-ready tasks. Always notes the fastest safe fix alongside the correct long-term fix. Flags technical debt before it becomes the next bug. Never lets a fix plan leave without a test-for-completion criterion.

    - slug: reporter
      emoji: "📋"
      name: Reporter
      role: Synthesises findings into structured, client-ready reports and tracks quality metrics over time
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Quality reporting
        - Metrics and trend analysis
        - Executive summaries
        - Acceptance criteria validation
        - Retrospective facilitation
      personality: |
        Clear-eyed communicator who writes reports a non-technical stakeholder can act on without a translator. Cuts jargon, keeps severity honest, and never buries a P0 in a footnote. Tracks defect trends so the same class of bug doesn't appear in the next cycle.

  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "Executive control room for the {{brand_name}} QA operation."
      members: [test-engineer, bug-analyst, fix-planner, reporter]

    - slug: testing
      name: testing
      description: "Test design, execution, and results — all evidence lands here."
      members: [test-engineer, bug-analyst]

    - slug: bugs
      name: bugs
      description: "Defect triage, root cause analysis, and severity classification."
      members: [bug-analyst, fix-planner]

    - slug: planning
      name: planning
      description: "Remediation tasks, effort estimates, and improvement opportunities."
      members: [fix-planner, test-engineer]

    - slug: reports
      name: reports
      description: "Client-ready quality reports, metrics, and acceptance sign-off."
      members: [reporter, fix-planner]

  tasks:
    - channel: testing
      owner: test-engineer
      title: "Draft the test strategy and smoke suite"
      details: |
        Identify the top user-facing flows and integration boundaries. Write the smoke test suite first — the set of scenarios that must pass before deeper testing begins. Document scope and risk rationale in the wiki.

    - channel: testing
      owner: test-engineer
      title: "Execute the regression and exploratory suites"
      details: |
        Run the full regression suite against the target software. Then run an exploratory pass on the highest-risk areas. Log every result — pass, fail, or blocked — with reproduction steps and screenshots or logs.

    - channel: bugs
      owner: bug-analyst
      title: "Triage and classify all failures"
      details: |
        For every failure from the testing lane: confirm reproduction, isolate the root cause, classify severity (P0–P3) and priority. Write a structured bug report for each defect and flag any that block the release.

    - channel: planning
      owner: fix-planner
      title: "Build the fix and improvement plan"
      details: |
        For each classified defect, produce a remediation task with: fastest safe fix, correct long-term fix, effort estimate, risk and dependencies, and a test-for-completion criterion. Identify any systemic improvement opportunities beyond individual bugs.

    - channel: reports
      owner: reporter
      title: "Produce the client quality report"
      details: |
        Synthesise all findings into a structured report: executive summary, defect summary by severity, test coverage metrics, top risks, fix plan overview, and a recommended go / no-go recommendation with rationale.

wiki_schema:
  dirs:
    - team/test-plans/
    - team/bugs/
    - team/fix-plans/
    - team/reports/
    - team/decisions/
    - team/metrics/
  bootstrap:
    - path: team/test-plans/strategy.md
      title: "Test strategy"
      skeleton: |
        # Test strategy

        _(Scope, risk rationale, and the three testing tiers: smoke, regression, exploratory. Update after each engagement.)_

        ## Scope
        ## Out of scope
        ## Smoke suite — must-pass flows
        ## Regression suite — known risk areas
        ## Exploratory targets — highest-uncertainty areas
        ## Exit criteria

    - path: team/bugs/classification-schema.md
      title: "Bug classification schema"
      skeleton: |
        # Bug classification schema

        _(Severity scale, root-cause taxonomy, SLAs, and escalation paths. Apply consistently — add a dated note when the schema changes.)_

        ## Severity scale
        - **P0 — Release blocker**: Data loss, security breach, or complete flow failure. Fix before any release.
        - **P1 — Critical**: Major feature broken with no workaround. Fix in the current sprint.
        - **P2 — Significant**: Feature degraded; workaround exists. Fix in the next sprint.
        - **P3 — Minor**: Cosmetic or low-impact. Schedule in backlog.

        ## Root-cause taxonomy
        - Logic error
        - Integration failure
        - Configuration drift
        - Race condition
        - Data validation gap
        - UI/UX defect
        - Performance regression

        ## Escalation rules

    - path: team/bugs/registry.md
      title: "Bug registry"
      skeleton: |
        # Bug registry

        _(One row per defect. Link to the detailed report in team/bugs/. Keep this as the single source of truth for status.)_

        | ID | Title | Severity | Root cause | Status | Fix plan |
        |----|-------|----------|------------|--------|----------|

    - path: team/fix-plans/active.md
      title: "Active fix plan"
      skeleton: |
        # Active fix plan

        _(Remediation tasks prioritised by severity. Each task must have: fastest safe fix, correct long-term fix, effort estimate, dependencies, and a test-for-completion criterion.)_

        ## P0 — Release blockers
        ## P1 — Critical fixes
        ## P2 — Next sprint
        ## P3 — Backlog
        ## Systemic improvements

    - path: team/reports/template.md
      title: "Quality report template"
      skeleton: |
        # Quality report — {{brand_name}}

        _(Fill in for each engagement. Archive completed reports in team/reports/archive/.)_

        ## Executive summary
        ## Test coverage
        | Suite | Scenarios | Pass | Fail | Blocked |
        |-------|-----------|------|------|---------|

        ## Defect summary
        | Severity | Count | Open | Fixed |
        |----------|-------|------|-------|

        ## Top risks
        ## Fix plan summary
        ## Recommendation
        - [ ] Go
        - [ ] No-go — blockers:

    - path: team/metrics/quality-trends.md
      title: "Quality trends"
      skeleton: |
        # Quality trends

        _(Track defect density, escape rate, fix cycle time, and test coverage over time. Add a row after each engagement.)_

        | Date | Engagement | Total bugs | P0 | P1 | P2 | P3 | Coverage % | Cycle time |
        |------|-----------|-----------|----|----|----|----|-----------|-----------|

    - path: team/decisions/log.md
      title: "Decision log"
      skeleton: |
        # Decision log

        _(Record every scope, severity, or process decision with a date and rationale. Prevents re-litigating the same calls each engagement.)_

