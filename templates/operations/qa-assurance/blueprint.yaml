connections:
  - name: "GitHub test lane"
    integration: github
    owner: Test Engineering
    priority: critical
    purpose: "Use GitHub for test plans, issue tracking, and defect management."
    smoke_test: "Create a dry-run issue and persist evidence."
    blocker: "Needs approved GitHub credentials before any live repository mutation."
  - name: "Gmail reporting lane"
    integration: gmail
    owner: Reporting
    priority: critical
    purpose: "Use Gmail for sending client quality reports and stakeholder updates."
    smoke_test: "Draft a dry-run report note and persist evidence without sending."
    blocker: "Needs approved Gmail credentials before any live send."
  - name: "Slack coordination lane"
    integration: slack
    owner: Operations
    priority: important
    purpose: "Use Slack for team coordination, triage updates, and escalation alerts."
    smoke_test: "Run a dry-run update and persist evidence."
    blocker: "Needs approved Slack credentials before any live message."
  - name: "Google Drive evidence lane"
    integration: google-drive
    owner: Knowledge
    priority: important
    purpose: "Use Drive for test artifacts, bug reports, and evidence bundles."
    smoke_test: "Write a mock artifact bundle and confirm persistence."
    blocker: "Needs approved Drive credentials before any live file mutation."

workflows:
  - id: test-strategy-dry-run
    name: Test strategy dry-run
    trigger: manual
    mode: dry_run
    integrations: [github]
    checklist:
      - Confirm test scope
      - Persist strategy evidence
      - Capture approval gate
    description: Validate the test strategy intake path without live side effects.
    definition:
      provider: one
      key: test-strategy-dry-run
    smoke_test:
      name: Test strategy dry-run
      mode: dry_run
      proof: Strategy evidence persisted without touching external systems.
      inputs:
        operation_name: QA Assurance
  - id: regression-execution
    name: Regression execution
    trigger: manual
    mode: dry_run
    integrations: [github, google-drive]
    checklist:
      - Confirm regression scope
      - Execute suite
      - Persist results evidence
    description: Validate the regression execution path and produce the first results bundle.
    definition:
      provider: one
      key: regression-execution
    smoke_test:
      name: Regression execution
      mode: dry_run
      proof: Regression evidence persisted successfully.
      inputs:
        operation_name: QA Assurance
  - id: bug-triage-review
    name: Bug triage review
    trigger: manual
    mode: mock
    integrations: [github, slack]
    checklist:
      - Confirm triage criteria
      - Classify all failures
      - Persist triage evidence
    description: Validate the bug triage and classification path.
    definition:
      provider: one
      key: bug-triage-review
    smoke_test:
      name: Bug triage review
      mode: mock
      proof: Triage evidence persisted successfully.
      inputs:
        operation_name: QA Assurance
  - id: quality-report-handoff
    name: Quality report handoff
    trigger: manual
    mode: mock
    integrations: [gmail, google-drive]
    checklist:
      - Confirm report contents
      - Confirm review gate
      - Persist handoff evidence
    description: Validate the final quality report handoff and evidence trail.
    definition:
      provider: one
      key: quality-report-handoff
    smoke_test:
      name: Quality report handoff
      mode: mock
      proof: Report evidence persisted successfully.
      inputs:
        operation_name: QA Assurance
