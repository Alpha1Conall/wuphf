    engine: execution
    description: "Run the smoke, regression, and exploratory suites against the target software."
    exit_criteria: "All scenarios logged with pass/fail/blocked status and evidence."
  - id: triage
    name: Triage
    engine: execution
    description: "Classify every failure, isolate root causes, and assign severity."
